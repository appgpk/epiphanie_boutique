{{ extends "global/Page.html" }}
{{ block title }}Choisissez votre type de chaussure préférée{{ endblock }}

{{ block content }}

<style>
.next-btn {
  background-color: #ffb6c1;
  border: none;
  color: white;
  padding: 10px 22px;
  font-size: 16px;
  border-radius: 10px;
  cursor: pointer;
}

.survey-bg {
  min-height: 70vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: #fff2f6;
}

.survey-card {
  width: 100%;
  max-width: 700px;
  background: #ffd6e5;
  border: 1px solid #f3a9c3;
  border-radius: 18px;
  padding: 25px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

.shoe-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

.shoe-item {
  text-align: center;
}

/* ✅ FIX PRINCIPAL */
.shoe-item img {
  width: 100%;
  height: 220px;
  object-fit: contain;          /* ← NE COUPE PLUS */
  object-position: center bottom; /* ← remonte la chaussure */
  background: white;
  border-radius: 12px;
  padding: 10px;
}

/* dernière image centrée */
.shoe-item:last-child {
  grid-column: 1 / span 2;
  max-width: 50%;
  margin: 0 auto;
}
</style>

<div class="survey-bg">
  <div class="survey-card">

    <div class="shoe-grid">
      <div class="shoe-item">
        <img src="{% static 'shoes/shoes01.png' %}">
        {{ formfield 'rank1' }}
      </div>

      <div class="shoe-item">
        <img src="{% static 'shoes/shoes02.png' %}">
        {{ formfield 'rank2' }}
      </div>

      <div class="shoe-item">
        <img src="{% static 'shoes/shoes03.png' %}">
        {{ formfield 'rank3' }}
      </div>

      <div class="shoe-item">
        <img src="{% static 'shoes/shoes04.png' %}">
        {{ formfield 'rank4' }}
      </div>

      <div class="shoe-item">
        <img src="{% static 'shoes/shoes05.png' %}">
        {{ formfield 'rank5' }}
      </div>
    </div>

    <div style="margin-top:20px;">
      <button class="next-btn">
        Suivant
      </button>
    </div>

  </div>
</div>

{{ endblock }}
