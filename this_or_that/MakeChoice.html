{{ extends "global/Page.html" }}
{{ block title }}Title{{ endblock }}

{{ block content }}

<div id="image-container" style="width: 300px; height: 200px; overflow: hidden; border: 1px solid black;">
  <img id="swipe-img" src="{{ static image_path }}" style="width:100%; height:auto;"/>
</div>

<!-- Hidden field submitted to oTree -->
<input type="hidden" name="like" id="like">

<!-- Desktop fallback buttons (optional but recommended) -->
<div style="margin-top: 10px;">
  <button type="button" id="left-btn">⬅️ Je n'aime pas</button>
  <button type="button" id="right-btn">J'aime ➡️</button>
</div>

<!-- Real oTree submit button (hide it) -->
<div style="display:none;">
  {{ next_button }}
</div>

<script>
  const imgElement = document.getElementById('swipe-img');
  const choiceInput = document.getElementById('like');
  const formEl = document.querySelector('form');  // oTree wraps content in a <form>

  function submitChoice(val) {
    choiceInput.value = val;
    formEl.submit();
  }


  // Desktop buttons
  document.getElementById('left-btn').addEventListener('click', () => submitChoice(1));
  document.getElementById('right-btn').addEventListener('click', () => submitChoice(2));

  // Touch swipe
  let touchstartX = 0;
  let touchendX = 0;

  imgElement.addEventListener('touchstart', e => {
    touchstartX = e.changedTouches[0].screenX;
  });

  imgElement.addEventListener('touchend', e => {
    touchendX = e.changedTouches[0].screenX;
    const dx = touchendX - touchstartX;

    if (dx < -50) submitChoice(1); // swipe left
    if (dx >  50) submitChoice(2); // swipe right
  });
</script>

{{ endblock }}
