{{ extends "global/Page.html" }}
{{ block title }}Title{{ endblock }}

{{ block content }}

<div id="image-container" style="width: 300px; height: 200px; overflow: hidden; border: 1px solid black;">
  <img id="swipe-img" src="{{ static image_path }}" style="width:100%; height:auto;"/>
</div>

<!-- Hidden input that stores choice -->
<input type="hidden" name="choice" id="choice-input">

<button id="next-btn" class="otree-btn-next btn btn-primary" style="display:none;">
  Next
</button>

<script>
  const imgElement = document.getElementById('swipe-img');
  const choiceInput = document.getElementById('choice-input');
  const nextBtn = document.getElementById('next-btn');

  let touchstartX = 0;
  let touchendX = 0;

  imgElement.addEventListener('touchstart', e => {
      touchstartX = e.changedTouches[0].screenX;
  });

  imgElement.addEventListener('touchend', e => {
      touchendX = e.changedTouches[0].screenX;
      handleSwipe();
  });

  function handleSwipe() {
      if (touchendX < touchstartX - 50) {
          // Swipe left = choice 1
          choiceInput.value = 1;
          nextBtn.click();  // submit page
      }
      if (touchendX > touchstartX + 50) {
          // Swipe right = choice 2
          choiceInput.value = 2;
          nextBtn.click();  // submit page
      }
  }
</script>

{{ endblock }}
