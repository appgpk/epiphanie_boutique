{{ extends "global/Page.html" }}
{{ block title }}Choix des chaussures  nº {{round }} {{ endblock }}

{{ block content }}

<style>
  /* Same pink look as your intro/demographics pages */
  .page-bg {
    min-height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: #fff2f6; /* very light pink */
  }

  .pink-card {
    width: 100%;
    max-width: 700px;
    background: #ffd6e5; /* light pink card */
    border: 1px solid #f3a9c3;
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    text-align: center;
  }

  .img-wrap {
    margin: 10px auto 16px auto;
    background: rgba(255,255,255,0.65);
    border-radius: 16px;
    padding: 12px;
    display: inline-block;
    max-width: 520px;
    width: 100%;
  }

  .img-wrap img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 12px;
    margin: 0 auto;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .choice-btn {
    background-color: #ffb6c1; /* light pink */
    border: 1px solid rgba(0,0,0,0.08);
    color: #ffffff;
    padding: 10px 18px;
    font-size: 16px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    min-width: 170px;
  }

  .choice-btn:hover {
    background-color: #ff9fb3;
  }

  .hint {
    font-size: 14px;
    margin-top: 10px;
    opacity: 0.85;
  }
</style>

<div class="page-bg">
  <div class="pink-card">

    <div class="img-wrap">
      <img id="swipe-img" src="{{ static image_path }}" alt="Chaussure">
    </div>

    <!-- Hidden field submitted to oTree -->
    <input type="hidden" name="like" id="like">

    <!-- Buttons BELOW the image -->
    <div class="btn-row">
      <button type="button" class="choice-btn" id="left-btn">👎🏾 Je n'aime pas</button>
      <button type="button" class="choice-btn" id="right-btn">J'aime 👍🏾</button>
    </div>

    <div class="hint">Sur téléphone : tu peux aussi swiper à gauche/droite.</div>

    <!-- Real oTree submit button (hide it) -->
    <div style="display:none;">
      {{ next_button }}
    </div>

  </div>
</div>

<script>
  const imgElement = document.getElementById('swipe-img');
  const choiceInput = document.getElementById('like');
  const formEl = document.querySelector('form');  // oTree wraps content in a <form>

  function submitChoice(val) {
    choiceInput.value = val;   // 1 = dislike, 2 = like (as in your Python)
    formEl.submit();
  }

  // Desktop buttons
  document.getElementById('left-btn').addEventListener('click', () => submitChoice(1));
  document.getElementById('right-btn').addEventListener('click', () => submitChoice(2));

  // Touch swipe
  let touchstartX = 0;

  imgElement.addEventListener('touchstart', e => {
    touchstartX = e.changedTouches[0].screenX;
  });

  imgElement.addEventListener('touchend', e => {
    const touchendX = e.changedTouches[0].screenX;
    const dx = touchendX - touchstartX;

    if (dx < -50) submitChoice(1); // swipe left
    if (dx >  50) submitChoice(2); // swipe right
  });
</script>

{{ endblock }}
